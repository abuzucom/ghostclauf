# ── Ghostclauf configuration (non-secret) ────────────────────────────────────
# Copy to config.yaml and edit. Secrets live in .env, never here.

# The channels the bot operates in. Each broadcaster needs its own OAuth token.
broadcasters:
  - login: your_first_streamer_login
    tokenStorePath: ./data/first-broadcaster-tokens.json
  - login: your_second_streamer_login
    tokenStorePath: ./data/second-broadcaster-tokens.json

# The account the bot posts as. This is the account you authorize via `npm run auth`.
bot:
  login: your_bot_login

chat:
  # Prefix that marks a chat command, e.g. "!ping".
  commandPrefix: "!"

plugins:
  # Directories scanned for plugins, in order. Built-in plugins ship under the
  # app itself; add extra dirs here (mounted as a Docker volume) to drop in your
  # own without rebuilding the image. Paths are relative to the working dir.
  directories:
    - "./dist/plugins"   # built-in plugins (compiled)
    - "/data/plugins"    # external drop-in plugins (optional volume)

  # Only plugins whose `name` appears here are initialized. Everything else is
  # discovered but left dormant.
  enabled:
    - ping
    - wentlive
    - streak
    - followage

  # Per-plugin configuration blocks, keyed by plugin name.
  config:
    wentlive:
      # {streamer} and {timestamp} are substituted at send time.
      template: "{streamer} has gone live at {timestamp}"
      # UTC timestamp format: "iso" (2026-07-12T18:04:05Z) or "utc" (Sun, 12 Jul 2026 18:04:05 GMT).
      timestampFormat: "iso"
    streak:
      # Where per-viewer attendance streaks are persisted (own store under ./data).
      dataPath: ./data/streaks.json
      # IANA timezone used for day boundaries (e.g. America/New_York). Default UTC.
      timezone: UTC
      # Only count days the stream was actually live (via the stream.online event
      # or the admin open command). Set false to also count any check-in day.
      requireStreamDay: true
      # Pool streak state across every broadcaster configured above (useful when
      # they're all the same streamer's channels). Set false to keep each
      # channel's streaks fully independent. Note: when pooled, the broadcaster
      # of ANY configured channel can !streakset / !streakreset viewers in the
      # shared pool, affecting every channel.
      shareAcrossChannels: true
      # Seconds a chatter must wait between handled !checkin attempts; repeats
      # inside the window are silently ignored (protects the store from chat
      # floods). Set 0 to disable.
      checkinCooldownSeconds: 10
      # How long after a stream starts a check-in still counts toward that
      # stream's day, so a stream that runs past midnight doesn't get cut off.
      # Tune to roughly your longest typical stream length.
      streamSessionHours: 18
      # Optional: override trigger words (defaults shown).
      # triggers:
      #   checkin: checkin
      #   streak: streak
      #   reset: streakreset
      #   set: streakset
      #   open: streakopen
      # Optional: override reply templates. Tokens: {user} {streak} {longest} {day}.
      # messages:
      #   extended: "@{user} checked in! Streak: {streak} days (best {longest})."
