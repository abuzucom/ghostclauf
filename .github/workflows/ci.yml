name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  node:
    name: Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 20
          - 22
    steps:
      - uses: actions/checkout@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
      - uses: actions/setup-node@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: node
    steps:
      - uses: actions/checkout@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
      - run: docker build -t ghostclauf:ci .
