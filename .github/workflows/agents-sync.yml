name: AGENTS.md sync check

on:
  push:
    paths:
      - AGENTS.md
      - CLAUDE.md
      - GEMINI.md
      - CONVENTIONS.md
      - .cursorrules
      - .clinerules
      - .windsurfrules
      - .copilot-instructions
      - .github/copilot-instructions.md
      - scripts/sync.py
  pull_request:
    paths:
      - AGENTS.md
      - CLAUDE.md
      - GEMINI.md
      - CONVENTIONS.md
      - .cursorrules
      - .clinerules
      - .windsurfrules
      - .copilot-instructions
      - .github/copilot-instructions.md
      - scripts/sync.py

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - run: python3 scripts/sync.py --check
